    <script>
        // Immediate check to prevent flicker
        (function () {
            const userData = localStorage.getItem('userData');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    if (user.role === 'Seller') {
                        const navProducts = document.getElementById('navProducts');
                        if (navProducts) navProducts.style.display = 'flex';
                    }
                } catch (e) {
                    console.error('Error parsing user data for sidebar:', e);
                }
            }
        })();

                    <p style="font-weight: 600; color: #64748b;">Loading...</p>

                <div class="modal-header">
                    <h2>Submit Review</h2>
                    <span class="close-modal" onclick="closeReviewModal()">&times;</span>
                </div>
                <div class="modal-body">

                        <p style="color: #64748b; margin-bottom: 15px;">Rate your experience with this transaction</p>
                        <div class="rating-stars" id="starRating">
                            <i class="fas fa-star star-btn" data-value="1" onclick="setRating(1)"></i>
                            <i class="fas fa-star star-btn" data-value="2" onclick="setRating(2)"></i>
                            <i class="fas fa-star star-btn" data-value="3" onclick="setRating(3)"></i>
                            <i class="fas fa-star star-btn" data-value="4" onclick="setRating(4)"></i>
                            <i class="fas fa-star star-btn" data-value="5" onclick="setRating(5)"></i>

                        <button id="submitReviewBtn" class="btn btn-primary full-width" style="width: 100%; transition: transform 0.2s;" onclick="submitReview()">Submit Elite Review</button>
                    </div>

    <script>
        // Orders Page Logic
        document.addEventListener('DOMContentLoaded', async () => {
            const auth = firebase.auth();
            const db = firebase.database();

            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'auth.html?mode=signin';
                    return;
                }

                // Load User Data
                const userSnap = await db.ref('users/' + user.uid).once('value');
                const userData = userSnap.val();

                updateUserProfile(userData);

                // Show Products link if Seller
                if (userData.role === 'Seller') {
                    const navProducts = document.getElementById('navProducts');
                    if (navProducts) navProducts.style.display = 'flex';
                }

                loadOrders(user.uid, userData.role);
            });
        });

        function updateUserProfile(user) {
            if (!user) return; // Silent skip if no DB profile yet
            
            const name = user.displayName || user.fullName || user.name || 'Elite User';
            const role = user.role || 'Buyer';
            
            document.getElementById('userName').textContent = name;
            document.getElementById('userRole').textContent = role;
            
            const avatar = document.getElementById('userAvatar');
            if (avatar) {
                if (user.profilePic || user.profile?.avatar) {
                    avatar.src = user.profilePic || user.profile?.avatar;
                } else {
                    avatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                }
            }
        }

        async function loadOrders(uid, role) {
            const db = firebase.database();
            const container = document.getElementById('ordersContainer');
            if (!container) return;

            try {
                let orders = [];
                // 1. Fetch relevant orders
                if (role === 'Seller') {
                    const snap = await db.ref('orders').limitToLast(100).once('value');
                    if (snap.exists()) {
                        const checkOwnershipPromises = [];
                        snap.forEach(child => {
                            const o = child.val();
                            if (!o) return;
                            
                            const checkPromise = async () => {
                                try {
                                    if (o.sellerId === uid) return { id: child.key, ...o };
                                    if (o.items && Array.isArray(o.items) && o.items.some(i => i && i.sellerId === uid)) return { id: child.key, ...o };
                                    
                                    // product owner fallback
                                    if (o.items && o.items[0] && o.items[0].id) {
                                        const pSnap = await db.ref(`products/${o.items[0].id}/sellerId`).once('value');
                                        if (pSnap.exists() && pSnap.val() === uid) return { id: child.key, ...o };
                                    }
                                } catch (e) {
                                    console.warn('Ownership check failed for order:', child.key, e);
                                }
                                return null;
                            };
                            checkOwnershipPromises.push(checkPromise());
                        });
                        const results = await Promise.all(checkOwnershipPromises);
                        orders = results.filter(res => res !== null);
                    }
                } else {
                    const snap = await db.ref('orders').once('value');
                    if (snap.exists()) {
                        snap.forEach(child => {
                            const val = child.val();
                            if (!val) return;
                            if (val.buyerId === uid || (val.buyer && val.buyer.id === uid)) {
                                orders.push({ id: child.key, ...val });
                            }
                        });
                    }
                }

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 100px 20px; background: white; border-radius: 20px;">
                            <i class="fas fa-ghost" style="font-size: 3rem; color: #e2e8f0; margin-bottom: 20px; display: block;"></i>
                            <h3 style="color: #64748b;">No Orders Yet</h3>
                            <p style="color: #94a3b8; font-size: 0.9rem;">Start exploring the marketplace to find elite products.</p>
                        </div>
                    `;
                    return;
                }

                // Sort by date desc - with safety
                orders.sort((a, b) => {
                    const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                    const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                    return dateB - dateA;
                });
                
                window.allOrdersRaw = orders; // store for filtering

                await renderOrderCards(orders, role);
            } catch (error) {
                console.error('CRITICAL: Error loading orders:', error);
                container.innerHTML = `<div style="text-align:center; color:#ef4444; padding:40px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>Failed to synchronize order engine.</p>
                    <small>${error.message}</small>
                </div>`;
            }
        }

        async function renderOrderCards(orders, role) {
            const container = document.getElementById('ordersContainer');
            if (!container) return;
            
            const db = firebase.database();
            window.currentOrders = {}; // for modals

            const cardPromises = orders.map(async (o) => {
                if (!o || !o.id) return '';
                
                try {
                    window.currentOrders[o.id] = o;
                    
                    // participant data resolving - PRIORITIZE EMBEDDED DATA
                    const embeddedBuyerName = o.buyer && (o.buyer.name || o.buyer.displayName);
                    const embeddedSellerName = o.sellerName || (o.items && o.items[0]?.sellerName);
                    
                    const otherId = role === 'Seller' ? (o.buyerId || (o.buyer && o.buyer.id)) : (o.sellerId || (o.items && o.items[0]?.sellerId));
                    
                    let otherName = role === 'Seller' ? (embeddedBuyerName || 'Buyer Participant') : (embeddedSellerName || 'SafeTrade Merchant');
                    let otherLink = '#';

                    if (otherId) {
                        try {
                            otherLink = `seller-profile.html?id=${otherId}`;
                            
                            // If we don't have an embedded name, or if it's a generic placeholder, try fetching fresh
                            if (!otherName || otherName.includes('Participant') || otherName.includes('Merchant')) {
                                const uSnap = await db.ref('users/' + otherId).once('value');
                                if (uSnap.exists()) {
                                    const u = uSnap.val();
                                    otherName = u.displayName || u.fullName || u.name || otherName;
                                } else if (role === 'Buyer' && o.items && o.items[0]?.id) {
                                    const pSnap = await db.ref(`products/${o.items[0].id}`).once('value');
                                    if (pSnap.exists()) {
                                        const p = pSnap.val();
                                        otherName = p.sellerName || otherName;
                                        otherLink = `seller-profile.html?id=${p.sellerId}`;
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn('Participant lookup failed for order:', o.id, e);
                        }
                    }

                    const displayStatus = (o.status || 'pending').replace(/_/g, ' ');
                    const statusClass = (o.status || 'pending').toLowerCase();
                    const totalAmount = (o.total || 0).toFixed(0);
                    
                    let orderDate = 'Unknown Date';
                    if (o.createdAt) {
                        try {
                            orderDate = new Date(o.createdAt).toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' });
                        } catch(e) {}
                    }
                    
                    const mainImg = o.items && o.items[0] ? (o.items[0].img || o.items[0].image || '/static/images/placeholder.jpg') : '/static/images/placeholder.jpg';
                    const itemCount = o.items ? o.items.length : 0;
                    const showReview = (statusClass === 'delivered' || statusClass === 'completed');

                    return `
                        <div class="premium-order-card" onclick="openOrderModal('${o.id}')">
                            <div class="order-media">
                                <img src="${mainImg}" alt="Product Preview">
                            </div>
                            <div class="order-info">
                                <span class="order-id">#${String(o.id).substring(1, 8).toUpperCase()}</span>
                                <div class="order-participant">${otherName}</div>
                                <div class="order-meta">
                                    <span><i class="far fa-calendar-alt"></i> ${orderDate}</span>
                                    <span>•</span>
                                    <span>${itemCount} ${itemCount === 1 ? 'item' : 'items'}</span>
                                </div>
                            </div>
                            <div class="order-pricing">
                                <span class="total-amount">RS ${totalAmount}</span>
                                <div class="item-count">Net Total Value</div>
                            </div>
                            <div class="order-status-section" onclick="event.stopPropagation()">
                                <span class="axiom-status-badge badge-${statusClass}">${displayStatus}</span>
                                <div class="action-strip">
                                    ${showReview ? `
                                        <button onclick="openReviewModal('${o.id}')" class="axiom-mini-btn" title="Leave Review">
                                            <i class="fas fa-star" style="color: #fbbf24;"></i>
                                        </button>
                                    ` : ''}
                                    <a href="orderstatus.html?orderId=${o.id}" class="axiom-mini-btn" title="Track Logistics">
                                        <i class="fas fa-satellite-dish"></i>
                                    </a>
                                    <button onclick="openOrderModal('${o.id}')" class="axiom-mini-btn" title="View Details">
                                        <i class="fas fa-list-ul"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                } catch (cardError) {
                    console.error('Error rendering card for order:', o.id, cardError);
                    return ''; // Skip malformed card
                }
            });

            const cards = await Promise.all(cardPromises);
            container.innerHTML = cards.filter(c => c !== '').join('');
        }

        function filterOrders(status) {
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`.filter-tab[data-filter="${status}"]`).classList.add('active');

            if (!window.allOrdersRaw) return;

            let filtered = [];
            if (status === 'all') {
                filtered = window.allOrdersRaw;
            } else if (status === 'pending') {
                filtered = window.allOrdersRaw.filter(o => o.status === 'pending' || !o.status);
            } else {
                filtered = window.allOrdersRaw.filter(o => (o.status || '').toLowerCase() === status);
            }

            renderOrderCards(filtered, document.getElementById('userRole').textContent);
        }

        function openOrderModal(orderId) {
            const order = window.currentOrders[orderId];
            if (!order) return;

            const modal = document.getElementById('orderDetailsModal');
            const body = document.getElementById('orderModalBody');

            // Handle different data structures (shippingAddress vs buyer object)
            const shipping = order.shippingAddress || order.buyer || {};
            const items = order.items || [];
            const status = (order.status || 'pending').toLowerCase();
            const role = document.getElementById('userRole').textContent;

            // Map fields carefully
            const name = shipping.fullName || shipping.name || 'N/A';
            const phone = shipping.phone || 'N/A';
            const address = shipping.address || shipping.street || '';
            const city = shipping.city || '';
            const fullAddress = (address + (city ? ', ' + city : '')) || 'N/A';

            body.innerHTML = `
                <div class="tracking-stepper">
                    <div class="step ${status === 'pending' || !status ? 'active' : 'completed'}">
                        <div class="step-icon">1</div>
                        <span class="step-label">Ordered</span>
                    </div>
                    <div class="step ${status === 'verified' ? 'active' : (['shipped', 'delivered', 'completed'].includes(status) ? 'completed' : '')}">
                        <div class="step-icon">2</div>
                        <span class="step-label">Verified</span>
                    </div>
                    <div class="step ${status === 'shipped' ? 'active' : (['delivered', 'completed'].includes(status) ? 'completed' : '')}">
                        <div class="step-icon">3</div>
                        <span class="step-label">Shipped</span>
                    </div>
                    <div class="step ${['delivered', 'completed'].includes(status) ? 'active completed' : ''}">
                        <div class="step-icon">4</div>
                        <span class="step-label">Arrived</span>
                    </div>
                </div>

                <div class="modal-info-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                    <!-- Card 1: Logistics -->
                    <div class="info-card" style="background:#f8fafc; padding:15px; border-radius:12px; border: 1px solid #e2e8f0;">
                        <h4 style="font-size:0.75rem; text-transform:uppercase; color:#94a3b8; margin-bottom:10px; display:flex; align-items:center; gap:6px;">
                            <i class="fas fa-truck"></i> Logistics
                        </h4>
                        <p style="font-size:0.85rem; margin-bottom:4px;"><strong>No:</strong> #${order.id.substring(1, 10).toUpperCase()}</p>
                        <p style="font-size:0.85rem; margin-bottom:4px;"><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</p>
                        <p style="font-size:0.85rem;"><strong>Tracking:</strong> ${order.trackingNumber || 'Processing'}</p>
                    </div>

                    <!-- Card 2: Recipient/Buyer -->
                    <div class="info-card" style="background:#f8fafc; padding:15px; border-radius:12px; border: 1px solid #e2e8f0;">
                        <h4 style="font-size:0.75rem; text-transform:uppercase; color:#94a3b8; margin-bottom:10px; display:flex; align-items:center; gap:6px;">
                            <i class="fas fa-user-tag"></i> ${role === 'Seller' ? 'Buyer' : 'Receiver'}
                        </h4>
                        <p style="font-size:0.85rem; margin-bottom:4px; color:var(--axiom-primary); font-weight:700;">${name}</p>
                        <p style="font-size:0.8rem; margin-bottom:4px;"><i class="fas fa-phone-alt"></i> ${phone}</p>
                        <p style="font-size:0.8rem; color:#64748b; line-height:1.4;">${fullAddress}</p>
                    </div>

                    <!-- Card 3: Seller Info -->
                    <div class="info-card" style="background:#f8fafc; padding:15px; border-radius:12px; border: 1px solid #e2e8f0;">
                        <h4 style="font-size:0.75rem; text-transform:uppercase; color:#94a3b8; margin-bottom:10px; display:flex; align-items:center; gap:6px;">
                            <i class="fas fa-store"></i> Merchant
                        </h4>
                        <p style="font-size:0.85rem; margin-bottom:4px; font-weight:700;">${order.sellerName || 'SafeTradeHub Official'}</p>
                        <p style="font-size:0.8rem; color:#64748b;">Verification: <span style="color:#10b981;"><i class="fas fa-check-circle"></i> Axiom Certified</span></p>
                    </div>

                    <!-- Card 4: Payment Info -->
                    <div class="info-card" style="background:#f8fafc; padding:15px; border-radius:12px; border: 1px solid #e2e8f0;">
                        <h4 style="font-size:0.75rem; text-transform:uppercase; color:#94a3b8; margin-bottom:10px; display:flex; align-items:center; gap:6px;">
                            <i class="fas fa-shield-alt"></i> Settlement
                        </h4>
                        <p style="font-size:0.85rem; margin-bottom:4px;"><i class="fas fa-wallet"></i> ${String(order.paymentMethod || 'Wallet').replace(/_/g, ' ').toUpperCase()}</p>
                        <p style="font-size:0.8rem; color:#64748b;">Escrow ID: ${String(order.escrowId || 'STH-ESC-N/A').toUpperCase()}</p>
                    </div>
                </div>

                <div class="order-section" style="margin-top:20px;">
                    <h4 style="font-size:0.8rem; text-transform:uppercase; color:#94a3b8; margin-bottom:12px;">Order Manifest</h4>
                    <div style="max-height: 180px; overflow-y: auto; padding-right: 5px;">
                        ${items.map(item => `
                            <div class="item-row">
                                <img src="${item.img || item.image || '/static/images/placeholder.jpg'}" class="item-img" alt="${item.name}">
                                <div style="flex:1;">
                                    <p style="font-size:0.9rem; font-weight:700; margin-bottom:2px;">${item.name || item.title || 'Product'}</p>
                                    <p style="font-size:0.8rem; color:#64748b;">Quantity: ${(item.quantity || item.qty || 1)} x RS ${(item.price || 0)}</p>
                                </div>
                                <span class="badge-price">RS ${((item.price || 0) * (item.quantity || item.qty || 1)).toFixed(0)}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div style="margin-top:20px; background: #f1f5f9; padding: 15px; border-radius: 16px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:0.85rem; color:#64748b;">
                            <span>Subtotal</span>
                            <span>RS ${(order.subtotal || order.total || 0).toFixed(0)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:0.85rem; color:#64748b;">
                            <span>Shipping</span>
                            <span>RS ${(order.shippingTotal || 0).toFixed(0)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.85rem; color:#64748b;">
                            <span>Axiom Escrow Fee (2%)</span>
                            <span>RS ${(order.escrowFee || 0).toFixed(0)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; padding-top:10px; border-top: 1px solid #cbd5e1;">
                            <span style="font-weight:700; color:var(--axiom-secondary);">Total Settlement</span>
                            <span style="font-size:1.3rem; font-weight:800; color:var(--axiom-primary);">RS ${(order.totalAmount || order.total || 0).toFixed(0)}</span>
                        </div>
                    </div>
                </div>
            `;

            modal.style.display = 'block';
        }

        function closeOrderModal() {
            document.getElementById('orderDetailsModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('orderDetailsModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        function logout() {
            firebase.auth().signOut().then(() => window.location.href = 'index.html');
        }

        /* --- Review System Logic --- */
        let activeRating = 0;
        let activeReviewOrderId = null;

        function openReviewModal(orderId) {
            activeReviewOrderId = orderId;
            activeRating = 0;
            updateStarUI();
            document.getElementById('reviewComment').value = '';
            document.getElementById('reviewModal').style.display = 'flex';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
        }

        function setRating(val) {
            activeRating = val;
            updateStarUI();
        }

        function updateStarUI() {
            const stars = document.querySelectorAll('#starRating .star-btn');
            stars.forEach((s, idx) => {
                if (idx < activeRating) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });
        }

        async function submitReview() {
            if (activeRating === 0) {
                alert('Please select a star rating.');
                return;
            }

            const order = window.currentOrders[activeReviewOrderId];
            if (!order) return;

            const btn = document.getElementById('submitReviewBtn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Submitting...';

            try {
                const idToken = await firebase.auth().currentUser.getIdToken();
                const response = await fetch('/api/v1/reviews/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        orderId: activeReviewOrderId,
                        rating: activeRating,
                        comment: document.getElementById('reviewComment').value,
                        reviewerId: firebase.auth().currentUser.uid,
                        targetId: (document.getElementById('userRole').textContent === 'Seller') ? order.buyerId : order.sellerId,
                        productId: order.items[0]?.id || 'unknown',
                        type: (document.getElementById('userRole').textContent === 'Seller') ? 'Seller-to-Buyer' : 'Buyer-to-Seller'
                    })
                });

                const result = await response.json();
                if (result.success) {
                    if (window.NotificationManager) {
                        window.NotificationManager.showToast('Review Submitted', 'Thank you for your feedback!', 'success');
                    } else {
                        alert('Review submitted successfully!');
                    }
                    closeReviewModal();
                    // Optionally refresh the row to hide the review button
                    setTimeout(() => location.reload(), 2000);
                } else {
                    if (window.NotificationManager) {
                        window.NotificationManager.showToast('Error', result.error, 'error');
                    } else {
                        alert('Error: ' + result.error);
                    }
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (err) {
                console.error('Submit review error:', err);
                if (window.NotificationManager) {
                    window.NotificationManager.showToast('Error', 'Failed to submit review.', 'error');
                } else {
                    alert('Failed to submit review.');
                }
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    </script>
    <script src="/static/js/notification-manager.js"></script>
</body>

</html>
