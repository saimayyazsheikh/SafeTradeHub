<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Monitor - Admin SafeTradeHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Using existing dashboard.css for consistency -->
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .report-section {
            padding: 30px;
        }
        .report-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 6px solid #ef4444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .report-card:hover { transform: translateY(-3px); }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .report-title-group h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #1e293b;
        }
        .report-meta {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pending { background: #fef2f2; color: #991b1b; }
        .status-reviewed { background: #f0f9ff; color: #075985; }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .detail-item label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .detail-item span {
            font-weight: 600;
            color: #334155;
            font-size: 0.95rem;
        }
        .report-desc {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 15px;
            background: #fff;
            border: 1px dashed #e2e8f0;
            border-radius: 8px;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }
        .btn-admin {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-suspend { background: #ef4444; color: white; }
        .btn-ban { background: #1e293b; color: white; }
        .btn-delete { background: #f97316; color: white; }
        .btn-dismiss { background: #f1f5f9; color: #475569; }
        .btn-admin:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="dashboard-wrapper" style="display: flex; min-height: 100vh; background: #f1f5f9;">
        <!-- Simple Sidebar Mockup for consistent look -->
        <aside style="width: 250px; background: #1e293b; color: white; padding: 25px;">
            <div style="font-size: 1.5rem; font-weight: 700; margin-bottom: 40px; color: #3b82f6;">SafeTradeHub</div>
            <nav style="display: flex; flex-direction: column; gap: 10px;">
                <a href="admin-dashboard.html" style="color: #94a3b8; text-decoration: none; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-chart-line"></i> Analytics
                </a>
                <a href="#" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6; text-decoration: none; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-shield-alt"></i> Fraud Monitor
                </a>
                <a href="index.html" style="color: #94a3b8; text-decoration: none; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-home"></i> Main Site
                </a>
            </nav>
        </aside>

        <main style="flex: 1;">
            <header style="background: white; padding: 20px 40px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="margin: 0; font-size: 1.5rem; font-weight: 700;">Security Command Center</h1>
                    <p style="margin: 5px 0 0; color: #64748b; font-size: 0.9rem;">Reviewing fraud reports and flagging accounts</p>
                </div>
                <div id="activeCounter" style="background: #ef4444; color: white; padding: 5px 15px; border-radius: 50px; font-weight: 700; font-size: 0.8rem;">0 PENDING REPORTS</div>
            </header>

            <div class="report-section" id="reportsContainer">
                <!-- Reports injected here -->
                <div style="text-align: center; padding: 100px; color: #94a3b8;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="margin-bottom: 20px;"></i>
                    <h3>Initiating Security Scan...</h3>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/static/js/firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.database();
            const container = document.getElementById('reportsContainer');
            const counter = document.getElementById('activeCounter');

            db.ref('reports').orderByChild('timestamp').limitToLast(50).on('value', async (snap) => {
                const reports = snap.val();
                if (!reports) {
                    counter.textContent = "0 PENDING REPORTS";
                    container.innerHTML = `
                        <div style="text-align: center; padding: 100px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                            <i class="fas fa-check-circle fa-4x" style="color: #22c55e; margin-bottom: 20px;"></i>
                            <h2>System Clear</h2>
                            <p style="color: #64748b;">No fraudulent activity reports found in the queue.</p>
                        </div>`;
                    return;
                }

                const items = Object.entries(reports)
                    .map(([id, val]) => ({ id, ...val }))
                    .sort((a,b) => b.timestamp - a.timestamp);

                const pendingCount = items.filter(r => r.status === 'Pending').length;
                counter.textContent = `${pendingCount} PENDING REPORTS`;

                container.innerHTML = '';
                for (const r of items) {
                    const reporterSnap = await db.ref(`users/${r.reportedById}/displayName`).once('value');
                    const targetSnap = await db.ref(`users/${r.targetId}/displayName`).once('value');
                    const targetEmailSnap = await db.ref(`users/${r.targetId}/email`).once('value');
                    const productSnap = r.targetType === 'Product' ? await db.ref(`products/${r.targetId}/name`).once('value') : null;

                    const date = new Date(r.timestamp).toLocaleString();
                    const card = document.createElement('div');
                    card.className = 'report-card';
                    if (r.status === 'Reviewed') card.style.borderLeftColor = '#94a3b8';

                    card.innerHTML = `
                        <div class="report-header">
                            <div class="report-title-group">
                                <h3>${r.reason}</h3>
                                <div class="report-meta">Dispatched: ${date} • Report ID: #${r.id.substring(1,7).toUpperCase()}</div>
                            </div>
                            <span class="status-badge status-${r.status.toLowerCase()}">${r.status}</span>
                        </div>
                        <div class="report-grid">
                            <div class="detail-item">
                                <label>Reporter</label>
                                <span>${reporterSnap.val() || 'Anonymous Buyer'}</span>
                            </div>
                            <div class="detail-item">
                                <label>Suspect Element</label>
                                <span>${productSnap ? 'PRODUCT: ' + productSnap.val() : 'USER: ' + (targetSnap.val() || 'N/A')}</span>
                            </div>
                            <div class="detail-item">
                                <label>Suspect Email</label>
                                <span>${targetEmailSnap.val() || 'Privacy Protected'}</span>
                            </div>
                        </div>
                        <div class="report-desc">${r.description}</div>
                        <div class="action-bar">
                            ${r.status === 'Pending' ? `
                                ${r.targetType === 'User' ? `<button class="btn-admin btn-suspend" onclick="moderateAction('suspend', '${r.targetId}', '${r.id}')"><i class="fas fa-user-slash"></i> Suspend User</button>` : ''}
                                ${r.targetType === 'Product' ? `<button class="btn-admin btn-delete" onclick="moderateAction('delete_product', '${r.targetId}', '${r.id}')"><i class="fas fa-trash-alt"></i> Kill Listing</button>` : ''}
                                <button class="btn-admin btn-dismiss" onclick="moderateAction('dismiss', '', '${r.id}')"><i class="fas fa-check"></i> Mark as Resolved</button>
                            ` : `<span style="color: #94a3b8; font-size: 0.85rem; font-weight: 700;"><i class="fas fa-lock"></i> ACTION TAKEN AT ${new Date(r.timestamp).toLocaleDateString()}</span>`}
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        });

        async function moderateAction(type, targetId, reportId) {
            const db = firebase.database();
            
            if (type === 'suspend') {
                if (!confirm('Suspend this user and freeze their escrow/wallet?')) return;
                await db.ref(`users/${targetId}/isActive`).set(false);
                await db.ref(`users/${targetId}/role`).set('Suspended');
            } else if (type === 'delete_product') {
                if (!confirm('Permanently delete this product listing from the core index?')) return;
                await db.ref(`products/${targetId}`).remove();
            }

            // Always resolve the report
            await db.ref(`reports/${reportId}`).update({
                status: 'Reviewed',
                moderatedAt: firebase.database.ServerValue.TIMESTAMP
            });

            alert('Admin Protocol Executed Successfully.');
        }
    </script>
</body>
</html>
