<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Status – Safe Trade Hub</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <style>
    :root {
        --axiom-primary: #474bff;
        --axiom-success: #10b981;
        --axiom-surface: #ffffff;
        --axiom-border: #e2e8f0;
        --axiom-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --slate-800: #1e293b;
        --slate-600: #475569;
        --slate-400: #94a3b8;
    }

    body { background: #f8fafc; font-family: 'Inter', sans-serif; }

    .status-page-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .status-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .status-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .status-header p { color: #64748b; font-size: 1.1rem; }

    /* Horizontal Progress Stepper */
    .horizontal-stepper {
        display: flex;
        justify-content: space-between;
        margin-bottom: 30px;
        position: relative;
        padding: 0 10%;
    }
    .horizontal-stepper::before {
        content: '';
        position: absolute;
        top: 20px;
        left: 15%;
        right: 15%;
        height: 4px;
        background: #e2e8f0;
        z-index: 1;
    }
    .h-step {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 80px;
    }
    .h-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #fff;
        border: 4px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        font-size: 1rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .h-step.completed .h-circle { background: #22c55e; border-color: #22c55e; color: #fff; }
    .h-step.active .h-circle { background: #fff; border-color: var(--axiom-primary); color: var(--axiom-primary); box-shadow: 0 0 15px rgba(71, 75, 255, 0.3); }
    .h-label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .h-step.active .h-label { color: var(--axiom-primary); }
    .h-step.completed .h-label { color: #22c55e; }

    /* Dual Pane Layout */
    .order-status-grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 30px;
    }

    .glass-card {
        background: white;
        border-radius: 24px;
        border: 1px solid var(--axiom-border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        padding: 30px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f1f5f9;
    }

    .order-id-meta h2 { font-family: 'Outfit', sans-serif; font-size: 1.4rem; color: #1e293b; margin: 0; }
    .order-id-meta p { color: #94a3b8; font-size: 0.85rem; margin: 4px 0 0; }

    /* Vertical Timeline */
    .vertical-timeline {
        position: relative;
        padding-left: 20px;
    }
    .vertical-line {
        position: absolute;
        left: 26px;
        top: 0;
        bottom: 0;
        width: 3px;
        background: #e2e8f0;
        z-index: 1;
    }
    .timeline-progress {
        position: absolute;
        left: 26px;
        top: 0;
        width: 3px;
        background: #22c55e;
        z-index: 1;
        transition: height 1s ease;
    }
    .v-step {
        position: relative;
        z-index: 2;
        display: flex; gap: 20px; margin-bottom: 40px;
    }
    .v-circle {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #e2e8f0;
        border: 3px solid #fff;
        box-shadow: 0 0 0 2px #e2e8f0;
        flex-shrink: 0;
        margin-top: 5px;
    }
    .v-step.completed .v-circle { background: #22c55e; box-shadow: 0 0 0 2px #22c55e; }
    .v-step.active .v-circle { background: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
    .v-title { font-weight: 700; color: #1e293b; font-size: 1rem; margin-bottom: 4px; }
    .v-desc { color: #64748b; font-size: 0.85rem; line-height: 1.4; }
    .v-time { font-size: 0.75rem; color: #94a3b8; margin-top: 6px; }

    .scan-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #f1f5f9;
        color: #475569;
        padding: 4px 10px;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 700;
        margin-top: 8px;
        border: 1px solid #e2e8f0;
    }

    /* Right Side Info */
    .info-section { display: flex; flex-direction: column; gap: 20px; }
    .summary-card { background: #f8fafc; border-radius: 20px; padding: 25px; border: 1px solid #e2e8f0; }
    .summary-card h3 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; color: #0f172a; margin: 0 0 15px; }

    .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #64748b; }
    .summary-item.total { margin-top: 15px; padding-top: 15px; border-top: 1px dotted #cbd5e1; font-weight: 800; color: #1e293b; font-size: 1.1rem; }

    .escrow-shield { background: #ecfdf5; border: 1px solid #34d399; border-radius: 16px; padding: 20px; display: flex; gap: 15px; align-items: flex-start; }
    .escrow-shield i { font-size: 1.5rem; color: #059669; }
    .escrow-text h4 { margin: 0 0 5px; font-size: 0.9rem; color: #065f46; font-weight: 700; }
    .escrow-text p { margin: 0; font-size: 0.8rem; color: #047857; line-height: 1.4; }

    /* Buttons */
    .action-row { display: flex; gap: 12px; justify-content: center; margin-top: 40px; }
    .btn-axiom { padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; }
    .btn-axiom.primary { background: var(--axiom-primary); color: white; box-shadow: 0 4px 12px rgba(71, 75, 255, 0.2); }
    .btn-axiom.secondary { background: white; color: #475569; border: 1px solid #e2e8f0; }
    .btn-axiom.review { background: #fbbf24; color: #1e293b; }
    .btn-axiom:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

    /* Review Modal */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .modal-content { background: #fff; width: 95%; max-width: 500px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
    .modal-header { padding: 20px 25px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-size: 1.25rem; font-family: 'Outfit'; }
    .modal-body { padding: 30px; }
    .rating-stars { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .star-btn { font-size: 2rem; cursor: pointer; color: #e2e8f0; }
    .star-btn.active { color: #fbbf24; }

    @media (max-width: 900px) {
        .order-status-grid { grid-template-columns: 1fr; }
        .horizontal-stepper { display: none; }
    }
  </style>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- Firebase Configuration -->
  <script src="/static/js/firebase-config.js"></script>

  <!-- Load authentication system -->
  <script src="/static/js/auth-manager.js"></script>
  <script src="/static/js/header-manager.js"></script>
  <script src="/static/js/notification-manager.js"></script>
  <script src="/static/js/user-auth-guard.js"></script>
</head>

<body>
  <!-- Header will be injected by header-manager.js -->
  <div id="header-placeholder"></div>

  <div class="status-page-container">
    <div class="status-header">
      <h1>Order Status</h1>
      <p>Track your order and escrow protection status</p>
    </div>

    <div id="orderContent">
      </div>
    </div>
  </div>



  <script>
    // Global state
    let currentOrder = null;

    document.addEventListener('DOMContentLoaded', function () {
      // Initialize header
      if (window.HeaderManager) {
        window.HeaderManager.init();
      }

      initializeOrderStatus();
    });

    async function initializeOrderStatus() {
      
      
      try {
        // Wait for Auth with a 5s limit
        const user = await Promise.race([
            new Promise(resolve => {
                const unsubscribe = firebase.auth().onAuthStateChanged(user => {
                    if (typeof unsubscribe === 'function') unsubscribe();
                    
                    resolve(user);
                });
            }),
            new Promise(resolve => setTimeout(() => {
                console.warn('⚠️ OrderStatus: Auth check timed out, continuing as current user');
                resolve(firebase.auth().currentUser);
            }, 5000))
        ]);

        if (!user) {
          
          window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href);
          return;
        }

        // Get order ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');

        if (!orderId) {
          console.error('❌ OrderStatus: Missing Order ID');
          showError('Order ID not provided');
          return;
        }

        
        loadOrderData(orderId);

      } catch (error) {
        console.error('❌ OrderStatus: Critical error:', error);
        showError('Failed to initialize page: ' + error.message);
      }
    }

    function loadOrderData(orderId) {
      const db = firebase.database();

      const timeoutCtx = setTimeout(() => {
        showError('Request timed out. Please check your connection.');
      }, 10000);

      // Listen for order updates
      db.ref(`orders/${orderId}`).on('value', (snapshot) => {
        clearTimeout(timeoutCtx);
        const order = snapshot.val();

        if (!order) {
          showError('Order not found');
          return;
        }

        currentOrder = order;

        // Fetch Tracking History in parallel
        db.ref(`tracking_history/${orderId}`).once('value').then(historySnap => {
            const history = historySnap.val();
            
            // Load escrow data if exists
            if (order.escrowId) {
                db.ref(`escrows/${order.escrowId}`).once('value').then(escrowSnap => {
                    currentEscrow = escrowSnap.val();
                    renderOrder(order, currentEscrow, history);
                }).catch(e => {
                    console.warn('Escrow data inaccessible:', e);
                    renderOrder(order, null, history);
                });
            } else {
                renderOrder(order, null, history);
            }
        }).catch(e => {
            console.error('Tracking history inaccessible:', e);
            // Render even if history is missing
            renderOrder(order, null, null);
        });
      }, (error) => {
        clearTimeout(timeoutCtx);
        console.error('Error loading order:', error);
        showError('Permission denied or error loading data: ' + (error.message || error.code));
      });
    }

    function renderOrder(order, escrow, history) {
      const container = document.getElementById('orderContent');

      const timeline = getTimeline(order.status, history);
      const progressHeight = getProgressPercentage(order.status);

      // Horizontal steps for top view
      const hSteps = [
          { status: 'pending', icon: 'fas fa-shopping-cart', label: 'Ordered' },
          { status: 'verified', icon: 'fas fa-shield-check', label: 'Verified' },
          { status: 'in_transit', icon: 'fas fa-truck-fast', label: 'Transit' },
          { status: 'delivered', icon: 'fas fa-check-double', label: 'Arrived' }
      ];

      const statusOrder = ['pending', 'received_at_seller_hub', 'verified', 'in_transit', 'arrived_at_dest_hub', 'out_for_delivery', 'delivered'];
      const currentRank = statusOrder.indexOf(order.status);

      container.innerHTML = `
        <div class="horizontal-stepper">
            ${hSteps.map((s, idx) => {
                const targetRank = statusOrder.indexOf(s.status);
                let state = (currentRank >= targetRank) ? 'completed' : (idx === 0 ? 'active' : 'pending');
                if (currentRank === targetRank) state = 'active';
                return `
                    <div class="h-step ${state}">
                        <div class="h-circle"><i class="${s.icon.replace('shield-check', 'shield-alt')}"></i></div>
                        <span class="h-label">${s.label}</span>
                    </div>
                `;
            }).join('')}
        </div>

        <div class="order-status-grid">
            <!-- Left: Vertical Timeline -->
            <div class="glass-card">
                <div class="card-header">
                    <div class="order-id-meta">
                        <h2>Order Tracking History</h2>
                        <p>Real-time updates from our verification nodes</p>
                    </div>
                </div>

                <div class="vertical-timeline">
                    <div class="vertical-line"></div>
                    <div class="timeline-progress" style="height: ${progressHeight}%"></div>
                    ${timeline.map(step => `
                        <div class="v-step ${step.state}">
                            <div class="v-circle"></div>
                            <div class="v-content">
                                <div class="v-title">${step.label}</div>
                                <div class="v-desc">${step.desc}</div>
                                ${step.actualDate ? `<div class="v-time"><i class="far fa-clock"></i> ${step.actualDate}</div>` : ''}
                                ${step.actualLocation ? `<div class="scan-badge"><i class="fas fa-barcode"></i> ${step.actualLocation} Hub</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>

            <!-- Right: Order Summary -->
            <div class="info-section">
                <div class="glass-card" style="padding: 25px;">
                    <div class="order-id-meta" style="margin-bottom: 20px;">
                        <h2 style="font-size: 1.1rem;">Transaction Summary</h2>
                        <p style="font-size: 0.75rem;">Order ID: #${order.id.substring(1, 10).toUpperCase()}</p>
                    </div>

                    <div class="escrow-shield">
                        <i class="fas fa-shield-alt"></i>
                        <div class="escrow-text">
                            <h4>Escrow Protection Active</h4>
                            <p>Funds are secured in SafeTradeHub Settlement account while in ${order.status.replace(/_/g, ' ')} phase.</p>
                        </div>
                    </div>

                    <div style="margin-top: 25px;">
                        ${(order.items || []).map(item => `
                            <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 15px;">
                                <img src="${item.img || '/static/images/placeholder.jpg'}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
                                <div style="flex:1;">
                                    <div style="font-size:0.9rem; font-weight:700; color:#1e293b;">${item.title || item.name}</div>
                                    <div style="font-size:0.75rem; color:#64748b;">Qty: ${item.qty}</div>
                                </div>
                                <div style="font-weight:700; font-size:0.9rem; color:#1e293b;">${formatCurrency(item.price * item.qty)}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="summary-card">
                        <div class="summary-item"><span>Subtotal</span><span>${formatCurrency(order.subtotal)}</span></div>
                        <div class="summary-item"><span>Shipping</span><span>${formatCurrency(order.shippingTotal || 0)}</span></div>
                        <div class="summary-item"><span>Processing Fee</span><span>${formatCurrency(order.escrowFee || (order.total * 0.02))}</span></div>
                        <div class="summary-item total"><span>Grand Total</span><span>${formatCurrency(order.total)}</span></div>
                    </div>
                </div>

                <div class="action-row">
                    <a href="dashboard.html" class="btn-axiom secondary"><i class="fas fa-home"></i> Dashboard</a>
                    <a href="orders.html" class="btn-axiom primary"><i class="fas fa-shopping-bag"></i> My Orders</a>
                </div>
            </div>
        </div>
      `;
    }

    function getTimeline(currentStatus, history) {
      const steps = [
        { id: 'pending', label: 'Order Placed', desc: 'Order received and confirmed.', icon: 'fas fa-shopping-cart' },
        { id: 'received_at_seller_hub', label: 'Received at Origin Hub', desc: 'Item reached the starting hub for verification.', icon: 'fas fa-warehouse' },
        { id: 'verified', label: 'Verified & Sealed', desc: 'Safe Ship staff verified and sealed the package.', icon: 'fas fa-search' },
        { id: 'in_transit', label: 'In Transit', desc: 'Package is moving between region hubs.', icon: 'fas fa-truck' },
        { id: 'arrived_at_dest_hub', label: 'At Destination Hub', desc: 'Reached your city hub for local delivery.', icon: 'fas fa-map-marker-alt' },
        { id: 'out_for_delivery', label: 'Out for Delivery', desc: 'Our courier is on the way to your address.', icon: 'fas fa-motorcycle' },
        { id: 'delivered', label: 'Delivered', desc: 'Package handed over and escrow released.', icon: 'fas fa-box-open' }
      ];

      const statusOrder = ['pending', 'received_at_seller_hub', 'verified', 'in_transit', 'arrived_at_dest_hub', 'out_for_delivery', 'delivered'];
      const currentIndex = statusOrder.indexOf(currentStatus);

      // Convert history object to array and sort by timestamp
      const historyArr = history ? Object.values(history).sort((a, b) => b.timestamp - a.timestamp) : [];

      return steps.map((step, index) => {
        let state = 'pending';
        if (index < currentIndex) state = 'completed';
        else if (index === currentIndex) state = 'active';

        // Find the LATEST match in history for this status
        const match = historyArr.find(h => h.status === step.id);
        
        return { 
            ...step, 
            state,
            actualDate: match ? formatDate(match.timestamp) : null,
            actualLocation: match ? match.location : null,
            desc: match && match.desc ? match.desc : step.desc // Use dynamic desc if available
        };
      });
    }

    function getProgressPercentage(status) {
      const statusOrder = ['pending', 'received_at_seller_hub', 'verified', 'in_transit', 'arrived_at_dest_hub', 'out_for_delivery', 'delivered'];
      const index = statusOrder.indexOf(status);
      if (index === -1) return 0;
      return (index / (statusOrder.length - 1)) * 100;
    }

    // Tracking percentage logic stays same, styles moved to head

    function getStatusBadgeClass(status) {
      if (!status) return 'pending';
      switch (status.toLowerCase()) {
        case 'delivered':
        case 'completed': return 'success';
        case 'disputed':
        case 'cancelled': return 'danger';
        case 'verified':
        case 'in_transit': return 'info';
        default: return 'warning';
      }
    }

    function formatStatus(status) {
      if (!status) return 'Pending';
      return status.split('_').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
      ).join(' ');
    }

    function formatCurrency(amount) {
      return 'RS ' + (amount || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatDate(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      return date.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric'
      }) + ' - ' + date.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      });
    }

    function showError(message) {
      const container = document.getElementById('orderContent');
      container.innerHTML = `
        <div class="error-container" style="text-align: center; padding: 50px 20px;">
          <i class="fas fa-exclamation-circle fa-3x" style="margin-bottom: 15px; color: #ef4444;"></i>
          <h3 style="font-size: 1.5rem; margin-bottom: 10px;">Oops! Access Limited</h3>
          <p style="color: #64748b;">${message}</p>
          <a href="orders.html" class="btn btn-primary" style="margin-top: 20px; display: inline-block; padding: 10px 20px; text-decoration: none; background: #3b82f6; color: white; border-radius: 8px;">
            Return to My Orders
          </a>
        </div>
      `;
    }

    /* --- Review System Integration --- */
    let activeRating = 0;


  </script>
</body>

</html>
